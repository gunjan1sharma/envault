name: envault_cli
description: >
  Standalone generator CLI for the envault package.
  Generates AES-256-GCM encrypted secrets without any build_runner coupling.
version: 0.1.0
homepage: https://github.com/envault/envault
repository: https://github.com/envault/envault

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  envault:
    path: ../envault
  cryptography: ^2.7.0
  args: ^2.5.0
  path: ^1.9.0
  analyzer: '>=6.0.0 <7.0.0'

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0

executables:
  envault: envault
