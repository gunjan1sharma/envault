name: envault
description: >
  Fintech-grade secret management for Flutter/Dart.
  AES-256-GCM encryption in generated code, SecureString type,
  build-time validation, and git hygiene enforcement.
  The only Dart package with a derived key (never stored in binary).
version: 0.1.0
homepage: https://github.com/envault/envault
repository: https://github.com/envault/envault
issue_tracker: https://github.com/envault/envault/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.4
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
  test: ^1.25.0
