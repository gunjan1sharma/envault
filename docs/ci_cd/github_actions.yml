name: Flutter Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Install envault CLI
        run: dart pub global activate envault_cli

      - name: Generate encrypted vault
        env:
          VAULT_MASTER_PASSWORD: ${{ secrets.VAULT_MASTER_PASSWORD }}
        run: envault generate --package=com.myapp --flavor=prod

      - name: Build APK
        run: |
          flutter build apk \
            --dart-define=VAULT_MASTER_PASSWORD=${{ secrets.VAULT_MASTER_PASSWORD }} \
            --release
